name: Diagnose GitHub Pages

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  actions: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Assemble source files
        run: bash .github/scripts/assemble.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run check

      - name: Build game
        run: npm run build

      - name: Query or enable Pages
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          get_status=$(curl --silent --show-error --output pages-before.json --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${REPOSITORY}/pages")
          printf 'pages_api_before=%s\n' "${get_status}" > diagnostic-status.txt

          if [ "${get_status}" = "404" ]; then
            enable_status=$(curl --silent --show-error --request POST --output pages-enable.json --write-out '%{http_code}' \
              --header 'Accept: application/vnd.github+json' \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              --header 'Content-Type: application/json' \
              --data '{"build_type":"workflow"}' \
              "https://api.github.com/repos/${REPOSITORY}/pages")
            printf 'pages_enable_status=%s\n' "${enable_status}" >> diagnostic-status.txt
          else
            cp pages-before.json pages-enable.json
            printf 'pages_enable_status=not-needed\n' >> diagnostic-status.txt
          fi

          final_status=$(curl --silent --show-error --output pages-after.json --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${REPOSITORY}/pages")
          printf 'pages_api_after=%s\n' "${final_status}" >> diagnostic-status.txt

      - name: Check public site
        run: |
          status=$(curl --silent --show-error --location --output /dev/null --write-out '%{http_code}' \
            'https://krisraves.github.io/IT-Manager-Simulator-/')
          printf 'public_site_status=%s\n' "${status}" >> diagnostic-status.txt

      - name: Upload diagnostic result
        uses: actions/upload-artifact@v4
        with:
          name: pages-diagnostic
          path: |
            pages-before.json
            pages-enable.json
            pages-after.json
            diagnostic-status.txt
          if-no-files-found: error
