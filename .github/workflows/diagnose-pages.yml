name: Diagnose GitHub Pages

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: read
  actions: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Assemble source files
        run: bash .github/scripts/assemble.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run check

      - name: Build game
        run: npm run build

      - name: Query Pages API
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          status=$(curl --silent --show-error --output pages.json --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${REPOSITORY}/pages")
          echo "Pages API HTTP status: ${status}"
          cat pages.json
          echo
          test "${status}" = "200" || test "${status}" = "404"

      - name: Check public site
        run: |
          status=$(curl --silent --show-error --location --output /dev/null --write-out '%{http_code}' \
            'https://krisraves.github.io/IT-Manager-Simulator-/')
          echo "Public site HTTP status: ${status}"
